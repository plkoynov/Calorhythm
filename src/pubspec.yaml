name: calorhythm
description: A simple, offline-first fitness tracker for home workouts.
version: 1.0.0+1

environment:
  sdk: '>=3.6.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.4

  # Local database (SQLite, type-safe)
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.22

  # Path for database location
  path_provider: ^2.1.3
  path: ^1.9.0

  # UI
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  fl_chart: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
